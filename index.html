<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Quote Generator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --pink: #f472b6;
      --pink-light: #fbcfe8;
      --purple: #a855f7;
      --purple-deep: #7c3aed;
      --rose: #fb7185;
      --lavender: #e879f9;
      --text: #ffffff;
      --sub: rgba(255,255,255,0.7);
      --card-bg: rgba(255,255,255,0.10);
      --border: rgba(255,255,255,0.18);
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1a0533 0%, #3b0764 25%, #701a75 50%, #9d174d 75%, #1a0533 100%);
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
      overflow: hidden;
      padding: 20px;
      font-family: 'Nunito', sans-serif;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -2;
      opacity: 0.5;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(244,114,182,0.30), transparent 45%),
        radial-gradient(circle at bottom right, rgba(168,85,247,0.30), transparent 45%),
        radial-gradient(circle at center, rgba(232,121,249,0.10), transparent 60%);
      z-index: -1;
      pointer-events: none;
    }

    
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      animation: floatOrb 8s ease-in-out infinite;
      z-index: -1;
      pointer-events: none;
    }

    .orb-1 {
      width: 400px; height: 400px;
      background: rgba(244,114,182,0.25);
      top: -100px; left: -100px;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 350px; height: 350px;
      background: rgba(168,85,247,0.25);
      bottom: -80px; right: -80px;
      animation-delay: 3s;
    }

    .orb-3 {
      width: 250px; height: 250px;
      background: rgba(232,121,249,0.20);
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      animation-delay: 5s;
    }

    @keyframes floatOrb {
      0%, 100% { transform: translate(0,0) scale(1); }
      50%       { transform: translate(20px, -20px) scale(1.08); }
    }

    .orb-2 {
      animation-name: floatOrb2;
    }

    @keyframes floatOrb2 {
      0%, 100% { transform: translate(0,0) scale(1); }
      50%       { transform: translate(-20px, 20px) scale(1.08); }
    }

    
    .container {
      width: 100%;
      max-width: 820px;
      padding: 50px 50px 40px;
      border-radius: 32px;
      backdrop-filter: blur(22px) saturate(180%);
      background: var(--card-bg);
      border: 1px solid var(--border);
      box-shadow:
        0 8px 32px rgba(0,0,0,0.35),
        0 0 0 1px rgba(255,255,255,0.05) inset,
        0 -1px 0 rgba(255,255,255,0.10) inset;
      text-align: center;
      animation: fadeUp 0.9s cubic-bezier(.22,1,.36,1) both;
      position: relative;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(50px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    
    .title-wrap {
      margin-bottom: 36px;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: 2.6rem;
      font-weight: 700;
      background: linear-gradient(to right, #fbcfe8, #f472b6, #e879f9, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
      line-height: 1.2;
      display: block;
    }

    .title-sub {
      display: block;
      color: var(--sub);
      font-size: 0.85rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 6px;
      font-weight: 300;
    }

    
    .quote-card {
      padding: 42px 38px;
      border-radius: 22px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      transition: transform 0.4s cubic-bezier(.22,1,.36,1), box-shadow 0.4s;
      position: relative;
      overflow: hidden;
    }

    .quote-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(to right, #f472b6, #e879f9, #a855f7);
    }

    .quote-card:hover {
      transform: translateY(-5px) scale(1.008);
      box-shadow: 0 20px 50px rgba(168,85,247,0.25);
    }

    
    .quote-mark {
      font-family: 'Playfair Display', serif;
      font-size: 7rem;
      line-height: 0.6;
      color: rgba(244,114,182,0.25);
      display: block;
      margin-bottom: 10px;
      font-style: italic;
      user-select: none;
    }

    .quote {
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem;
      line-height: 1.85;
      color: var(--text);
      font-weight: 500;
      min-height: 130px;
      font-style: italic;
    }

    .author {
      margin-top: 28px;
      background: linear-gradient(to right, #fbcfe8, #e879f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      font-family: 'Nunito', sans-serif;
      font-style: normal;
    }

    
    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(to right, #f472b6, #a855f7);
      margin: 20px auto 0;
      border-radius: 99px;
    }

    
    .buttons {
      margin-top: 38px;
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    button {
      padding: 14px 30px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: 'Nunito', sans-serif;
      letter-spacing: 0.5px;
      transition: all 0.35s cubic-bezier(.22,1,.36,1);
      position: relative;
      overflow: hidden;
    }

    button::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0);
      transition: background 0.3s;
    }

    button:hover::after {
      background: rgba(255,255,255,0.10);
    }

    button:active {
      transform: scale(0.96) !important;
    }

    .btn-new {
      background: linear-gradient(135deg, #f472b6 0%, #e879f9 50%, #a855f7 100%);
      color: white;
      box-shadow: 0 8px 28px rgba(168,85,247,0.45);
    }

    .btn-new:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 14px 36px rgba(168,85,247,0.55);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.10);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.18);
    }

    .btn-secondary:hover {
      transform: translateY(-3px) scale(1.04);
      background: rgba(255,255,255,0.16);
      box-shadow: 0 8px 20px rgba(0,0,0,0.20);
    }

    
    .footer {
      margin-top: 32px;
      color: rgba(255,255,255,0.35);
      font-size: 0.82rem;
      letter-spacing: 1px;
    }

    
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: linear-gradient(135deg, #f472b6, #a855f7);
      color: white;
      padding: 12px 28px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.9rem;
      box-shadow: 0 8px 25px rgba(168,85,247,0.5);
      transition: transform 0.4s cubic-bezier(.22,1,.36,1), opacity 0.4s;
      opacity: 0;
      pointer-events: none;
      z-index: 999;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    
    @media (max-width: 600px) {
      .container  { padding: 30px 22px 28px; }
      .title      { font-size: 2rem; }
      .quote      { font-size: 1.25rem; min-height: 100px; }
      .quote-card { padding: 28px 22px; }
      .buttons    { flex-direction: column; gap: 10px; }
      button      { width: 100%; }
    }
  </style>
</head>

<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="overlay"></div>

  <div class="toast" id="toast"></div>

  <div class="container">

    <div class="title-wrap">
      <span class="title">Moment of Wisdom</span>
      <span class="title-sub">Daily Inspiration</span>
    </div>

    <div class="quote-card" id="quoteCard">
      <span class="quote-mark">"</span>
      <p class="quote" id="quote"></p>
      <div class="divider"></div>
      <h3 class="author" id="author"></h3>
    </div>

    <div class="buttons">
      <button class="btn-new" onclick="getQuote()">✦ New Quote</button>
      <button class="btn-secondary" onclick="copyQuote()">⊕ Copy</button>
      <button class="btn-secondary" onclick="downloadImage()">↓ Download</button>
    </div>

    <div class="footer">✦ Made with love & passionate ✦</div>

  </div>

  <!-- THREE.JS 3D BACKGROUND -->
  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

    const scene    = new THREE.Scene();
    const camera   = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });

    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.domElement.style.position = 'fixed';
    renderer.domElement.style.top = '0';
    renderer.domElement.style.left = '0';
    renderer.domElement.style.zIndex = '-2';
    document.body.appendChild(renderer.domElement);

    // Torus knot
    const geometry = new THREE.TorusKnotGeometry(11, 2.8, 120, 18);
    const material = new THREE.MeshStandardMaterial({
      color: 0xd946ef,
      metalness: 0.85,
      roughness: 0.15,
      emissive: 0x7c3aed,
      emissiveIntensity: 0.15
    });
    const torus = new THREE.Mesh(geometry, material);
    scene.add(torus);

    // Lights — pink & purple theme
    const light1 = new THREE.PointLight(0xf472b6, 3);
    light1.position.set(60, 60, 60);
    scene.add(light1);

    const light2 = new THREE.PointLight(0xa855f7, 3);
    light2.position.set(-60, -60, -60);
    scene.add(light2);

    const light3 = new THREE.AmbientLight(0xe879f9, 0.4);
    scene.add(light3);

    camera.position.z = 35;

    // Particles
    const pGeo = new THREE.BufferGeometry();
    const count = 2800;
    const pos   = new Float32Array(count * 3);
    for (let i = 0; i < count * 3; i++) pos[i] = (Math.random() - 0.5) * 220;
    pGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));

    const pMat  = new THREE.PointsMaterial({ size: 0.14, color: 0xfce7f3 });
    const pMesh = new THREE.Points(pGeo, pMat);
    scene.add(pMesh);

    // Mouse
    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / innerWidth  - 0.5) * 2;
      const y = (e.clientY / innerHeight - 0.5) * 2;
      torus.rotation.x += y * 0.008;
      torus.rotation.y += x * 0.008;
    });

    function animate() {
      requestAnimationFrame(animate);
      torus.rotation.x  += 0.0025;
      torus.rotation.y  += 0.004;
      pMesh.rotation.y  += 0.0007;
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });
  </script>

  <!-- MAIN SCRIPT -->
  <script>
    const quoteEl  = document.getElementById('quote');
    const authorEl = document.getElementById('author');
    const toastEl  = document.getElementById('toast');

    const quotes = [
      { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill" },
      { text: "Push yourself, because no one else is going to do it for you.", author: "Unknown" },
      { text: "Dream big and dare to fail.", author: "Norman Vaughan" },
      { text: "Life is what happens when you're busy making other plans.", author: "John Lennon" },
      { text: "Stay hungry, stay foolish.", author: "Steve Jobs" },
      { text: "The future belongs to those who believe in their dreams.", author: "Eleanor Roosevelt" },
      { text: "Do something today that your future self will thank you for.", author: "Sean Patrick Flanery" },
      { text: "Your limitation — it's only your imagination.", author: "Unknown" },
      { text: "Innovation distinguishes between a leader and a follower.", author: "Steve Jobs" },
      { text: "Happiness depends upon ourselves.", author: "Aristotle" },
      { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
      { text: "In the middle of every difficulty lies opportunity.", author: "Albert Einstein" },
      { text: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius" },
      { text: "Our greatest glory is not in never falling, but in rising every time we fall.", author: "Confucius" },
      { text: "You are never too old to set another goal or to dream a new dream.", author: "C.S. Lewis" },
      { text: "Believe you can and you're halfway there.", author: "Theodore Roosevelt" },
      { text: "Act as if what you do makes a difference. It does.", author: "William James" },
      { text: "The secret of getting ahead is getting started.", author: "Mark Twain" },
      { text: "Don't watch the clock; do what it does. Keep going.", author: "Sam Levenson" },
      { text: "Keep your face always toward the sunshine, and shadows will fall behind you.", author: "Walt Whitman" }
    ];

    let lastIndex = -1;

    function getQuote() {
      let idx;
      do { idx = Math.floor(Math.random() * quotes.length); } while (idx === lastIndex);
      lastIndex = idx;
      const q = quotes[idx];
      typeWriter(q.text, q.author);
    }

    function typeWriter(text, author) {
      quoteEl.textContent  = '';
      authorEl.textContent = '';
      let i = 0;
      const interval = setInterval(() => {
        if (i < text.length) {
          quoteEl.textContent += text.charAt(i);
          i++;
        } else {
          clearInterval(interval);
          authorEl.textContent = '— ' + author;
        }
      }, 25);
    }

    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      setTimeout(() => toastEl.classList.remove('show'), 2400);
    }

    function copyQuote() {
      const text = quoteEl.textContent + ' ' + authorEl.textContent;
      navigator.clipboard.writeText(text).then(() => {
        showToast('✦ Quote copied!');
      }).catch(() => {
        showToast('Could not copy');
      });
    }

    function downloadImage() {
      html2canvas(document.querySelector('#quoteCard'), {
        backgroundColor: null,
        scale: 2
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = 'quote.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        showToast('✦ Image saved!');
      });
    }

    // Initial load
    getQuote();
  </script>

</body>
</html>
